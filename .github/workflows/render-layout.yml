name: Render layout diagram
on:
  push:
    paths:
      - 'linux/user-wide/symbols/fi'
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/render_layout.py symbols/fi layout.svg
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add layout.svg
          git diff --staged --quiet || git commit -m "chore: update layout diagram [skip ci]"
          git push
